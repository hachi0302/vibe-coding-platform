name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A new push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (typecheck + vitest)
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'Release:') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx vue-tsc --noEmit

      - name: Unit tests
        run: npm run test:run

  rust:
    name: rust (${{ matrix.os }}, clippy + cargo test)
    # macOS and Windows are both product targets and provide Tauri's native
    # dependencies on hosted runners. Linux packaging remains covered by the
    # release workflow because it needs the WebKitGTK apt stack.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    if: ${{ !startsWith(github.event.head_commit.message, 'Release:') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
