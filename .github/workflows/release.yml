name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build / publish (e.g. vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            file

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Generate updater latest.json
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          node <<'SCRIPT'
          const fs = require('fs')
          const path = require('path')
          const pkg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'))
          const version = pkg.version
          const releaseTag = process.env.RELEASE_TAG
          const repo = process.env.GITHUB_REPOSITORY

          if (!releaseTag) throw new Error('RELEASE_TAG is required')
          if (!repo) throw new Error('GITHUB_REPOSITORY is required')

          function releaseAssetUrl(file) {
            // GitHub replaces spaces with dots in release asset download URLs
            return `https://github.com/${repo}/releases/download/${releaseTag}/${file.replace(/ /g, '.')}`
          }

          function walk(dir) {
            let files = []
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, e.name)
              if (e.isDirectory()) files.push(...walk(full))
              else files.push(full)
            }
            return files
          }

          const bundleDir = 'src-tauri/target'
          const allFiles = walk(bundleDir)
          const platforms = {}

          const mapping = [
            { ext: '.app.tar.gz', sig: '.app.tar.gz.sig', key: ['darwin-x86_64', 'darwin-aarch64'] },
            { ext: '-setup.exe', sig: '-setup.exe.sig', key: ['windows-x86_64'] },
            { ext: '.AppImage', sig: '.AppImage.sig', key: ['linux-x86_64'] },
          ]

          for (const m of mapping) {
            const bundle = allFiles.find(f => f.endsWith(m.ext) && !f.endsWith('.sig'))
            const sigFile = allFiles.find(f => f.endsWith(m.sig))
            if (bundle && sigFile) {
              const sig = fs.readFileSync(sigFile, 'utf8').trim()
              const url = releaseAssetUrl(path.basename(bundle))
              for (const k of m.key) {
                platforms[k] = { signature: sig, url }
              }
            }
          }

          if (Object.keys(platforms).length === 0) {
            console.log('No updater platforms found, skipping latest.json')
            process.exit(0)
          }

          const bundleDirForJson = path.dirname(
            allFiles.find(f => f.endsWith('.sig')) || ''
          )
          const outDir = bundleDirForJson || bundleDir
          const manifest = {
            version,
            notes: '',
            pub_date: new Date().toISOString(),
            platforms,
          }
          const outPath = path.join(outDir, 'latest.json')
          fs.writeFileSync(outPath, JSON.stringify(manifest, null, 2) + '\n')
          console.log(`Generated ${outPath} with platforms: ${Object.keys(platforms).join(', ')}`)
          SCRIPT

      - name: Strip bundled libwayland-client from AppImage
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target -name '*.AppImage' -type f | head -1)
          [ -z "$APPIMAGE" ] && { echo "No AppImage found, skipping"; exit 0; }
          chmod +x "$APPIMAGE"
          # Extract, remove the conflicting lib, repack
          "$APPIMAGE" --appimage-extract
          rm -f squashfs-root/usr/lib/libwayland-client.so*
          # Download appimagetool if not present
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*-setup.exe
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.sig
            src-tauri/target/**/release/bundle/**/latest.json
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: dist
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Merge updater manifests
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const root = 'dist'
          const manifests = []
          const releaseTag = process.env.RELEASE_TAG
          const repo = process.env.GITHUB_REPOSITORY

          if (!releaseTag) throw new Error('RELEASE_TAG is required')
          if (!repo) throw new Error('GITHUB_REPOSITORY is required')

          function releaseAssetUrl(file) {
            // GitHub replaces spaces with dots in release asset download URLs
            return `https://github.com/${repo}/releases/download/${releaseTag}/${file.replace(/ /g, '.')}`
          }

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name)
              if (entry.isDirectory()) {
                walk(full)
              } else if (entry.name === 'latest.json') {
                manifests.push(full)
              }
            }
          }

          walk(root)
          if (!manifests.length) {
            throw new Error('No updater latest.json files found in downloaded artifacts')
          }

          // Collect ALL files in dist/ — artifact download may rename files
          // (e.g. spaces → dots), so we need the actual on-disk names for URLs.
          function walkAll(dir) {
            let files = []
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, e.name)
              if (e.isDirectory()) files.push(...walkAll(full))
              else files.push(full)
            }
            return files
          }
          const allDistFiles = walkAll(root)

          let merged = null
          for (const file of manifests) {
            const json = JSON.parse(fs.readFileSync(file, 'utf8'))
            if (!json.version || !json.platforms || typeof json.platforms !== 'object') {
              throw new Error(`Invalid updater manifest: ${file}`)
            }
            if (!merged) {
              merged = {
                version: json.version,
                notes: json.notes,
                pub_date: json.pub_date,
                platforms: {},
              }
            } else if (merged.version !== json.version) {
              throw new Error(`Updater manifest version mismatch: ${merged.version} vs ${json.version} in ${file}`)
            }
            Object.assign(merged.platforms, json.platforms)
          }

          // Re-derive URLs from actual files in dist/ — artifact upload/download
          // can replace spaces with dots in file names, making the build-job URLs stale.
          const extToKeys = [
            ['.app.tar.gz', ['darwin-x86_64', 'darwin-aarch64']],
            ['-setup.exe', ['windows-x86_64']],
            ['.AppImage',   ['linux-x86_64']],
          ]
          for (const [ext, keys] of extToKeys) {
            const actual = allDistFiles.find(f => f.endsWith(ext) && !f.endsWith('.sig'))
            if (!actual) continue
            const url = releaseAssetUrl(path.basename(actual))
            for (const k of keys) {
              if (merged.platforms[k]) merged.platforms[k].url = url
            }
          }

          const required = ['windows-x86_64', 'linux-x86_64']
          for (const platform of required) {
            if (!merged.platforms[platform]) {
              throw new Error(`Merged updater manifest is missing ${platform}`)
            }
          }
          if (!merged.platforms['darwin-x86_64'] && !merged.platforms['darwin-aarch64']) {
            throw new Error('Merged updater manifest is missing macOS platforms')
          }

          for (const file of manifests) {
            fs.rmSync(file, { force: true })
          }
          fs.writeFileSync(path.join(root, 'latest.json'), `${JSON.stringify(merged, null, 2)}\n`)
          console.log(`Merged ${manifests.length} updater manifests into dist/latest.json`)
          console.log(`Platforms: ${Object.keys(merged.platforms).sort().join(', ')}`)
          for (const [k, p] of Object.entries(merged.platforms)) {
            console.log(`  ${k}: ${p.url}`)
          }
          NODE

      - name: Generate release notes
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
