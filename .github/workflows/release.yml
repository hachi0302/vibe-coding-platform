name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build / publish (e.g. vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            file

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Strip bundled libwayland-client from AppImage
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target -name '*.AppImage' -type f | head -1)
          [ -z "$APPIMAGE" ] && { echo "No AppImage found, skipping"; exit 0; }
          chmod +x "$APPIMAGE"
          # Extract, remove the conflicting lib, repack
          "$APPIMAGE" --appimage-extract
          rm -f squashfs-root/usr/lib/libwayland-client.so*
          # Download appimagetool if not present
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      - name: Sign final updater bundles
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          RELEASE_DIR=release-assets
          mkdir -p "$RELEASE_DIR"

          case "${{ matrix.platform }}" in
            macos-latest)
              BUNDLE=$(find src-tauri/target -type f -name '*.app.tar.gz' -print -quit)
              ASSET="Vibe.Coding.Platform.app.tar.gz"
              ;;
            windows-latest)
              BUNDLE=$(find src-tauri/target -type f -name '*-setup.exe' -print -quit)
              ASSET="Vibe.Coding.Platform_${VERSION}_x64-setup.exe"
              ;;
            ubuntu-22.04)
              BUNDLE=$(find src-tauri/target -type f -name '*.AppImage' -print -quit)
              ASSET="Vibe.Coding.Platform_${VERSION}_amd64.AppImage"
              ;;
          esac

          [ -n "$BUNDLE" ] || { echo "No updater bundle found"; exit 1; }
          cp "$BUNDLE" "$RELEASE_DIR/$ASSET"
          npx tauri signer sign "$RELEASE_DIR/$ASSET"
          node -e "const c=require('crypto'),f=require('fs'); process.stdout.write(c.createHash('sha256').update(f.readFileSync(process.argv[1])).digest('hex'))" "$RELEASE_DIR/$ASSET" > "$RELEASE_DIR/$ASSET.sha256"

      - name: Generate updater latest.json
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          node <<'SCRIPT'
          const fs = require('fs')
          const path = require('path')
          const pkg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'))
          const version = pkg.version
          const releaseTag = process.env.RELEASE_TAG
          const repo = process.env.GITHUB_REPOSITORY

          if (!releaseTag) throw new Error('RELEASE_TAG is required')
          if (!repo) throw new Error('GITHUB_REPOSITORY is required')

          function releaseAssetUrl(file) {
            return `https://github.com/${repo}/releases/download/${releaseTag}/${file.replace(/ /g, '.')}`
          }

          function walk(dir) {
            let files = []
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, e.name)
              if (e.isDirectory()) files.push(...walk(full))
              else files.push(full)
            }
            return files
          }

          const bundleDir = 'release-assets'
          const allFiles = walk(bundleDir)
          const platforms = {}
          const mapping = [
            { ext: '.app.tar.gz', sig: '.app.tar.gz.sig', key: ['darwin-x86_64', 'darwin-aarch64'] },
            { ext: '-setup.exe', sig: '-setup.exe.sig', key: ['windows-x86_64'] },
            { ext: '.AppImage', sig: '.AppImage.sig', key: ['linux-x86_64'] },
          ]

          for (const m of mapping) {
            const bundle = allFiles.find(f => f.endsWith(m.ext) && !f.endsWith('.sig'))
            const sigFile = allFiles.find(f => f.endsWith(m.sig))
            if (bundle && sigFile) {
              const sig = fs.readFileSync(sigFile, 'utf8').trim()
              const url = releaseAssetUrl(path.basename(bundle))
              for (const k of m.key) platforms[k] = { signature: sig, url }
            }
          }

          if (Object.keys(platforms).length === 0) {
            throw new Error('No updater platforms found')
          }

          const manifest = { version, notes: '', pub_date: new Date().toISOString(), platforms }
          const outPath = path.join(bundleDir, 'latest.json')
          fs.writeFileSync(outPath, JSON.stringify(manifest, null, 2) + '\n')
          console.log(`Generated ${outPath} with platforms: ${Object.keys(platforms).join(', ')}`)
          SCRIPT

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            release-assets/**
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Merge updater manifests
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const root = 'dist'
          const manifests = []
          const releaseTag = process.env.RELEASE_TAG
          const repo = process.env.GITHUB_REPOSITORY

          if (!releaseTag) throw new Error('RELEASE_TAG is required')
          if (!repo) throw new Error('GITHUB_REPOSITORY is required')

          function releaseAssetUrl(file) {
            // GitHub replaces spaces with dots in release asset download URLs
            return `https://github.com/${repo}/releases/download/${releaseTag}/${file.replace(/ /g, '.')}`
          }

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name)
              if (entry.isDirectory()) {
                walk(full)
              } else if (entry.name === 'latest.json') {
                manifests.push(full)
              }
            }
          }

          function walkAll(dir) {
            let files = []
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name)
              if (entry.isDirectory()) files.push(...walkAll(full))
              else files.push(full)
            }
            return files
          }

          walk(root)
          if (!manifests.length) {
            throw new Error('No updater latest.json files found in downloaded artifacts')
          }

          let merged = null
          for (const file of manifests) {
            const json = JSON.parse(fs.readFileSync(file, 'utf8'))
            if (!json.version || !json.platforms || typeof json.platforms !== 'object') {
              throw new Error(`Invalid updater manifest: ${file}`)
            }
            if (!merged) {
              merged = {
                version: json.version,
                notes: json.notes,
                pub_date: json.pub_date,
                platforms: {},
              }
            } else if (merged.version !== json.version) {
              throw new Error(`Updater manifest version mismatch: ${merged.version} vs ${json.version} in ${file}`)
            }
            Object.assign(merged.platforms, json.platforms)
          }

          const required = ['windows-x86_64', 'linux-x86_64']
          for (const platform of required) {
            if (!merged.platforms[platform]) {
              throw new Error(`Merged updater manifest is missing ${platform}`)
            }
          }
          if (!merged.platforms['darwin-x86_64'] && !merged.platforms['darwin-aarch64']) {
            throw new Error('Merged updater manifest is missing macOS platforms')
          }

          for (const file of manifests) {
            fs.rmSync(file, { force: true })
          }
          for (const checksum of walkAll(root).filter(file => file.endsWith('.sha256'))) {
            const asset = checksum.slice(0, -'.sha256'.length)
            const expected = fs.readFileSync(checksum, 'utf8').trim()
            const actual = require('crypto').createHash('sha256').update(fs.readFileSync(asset)).digest('hex')
            if (actual !== expected) throw new Error(`Artifact checksum mismatch: ${asset}`)
            fs.rmSync(checksum, { force: true })
          }
          fs.writeFileSync(path.join(root, 'latest.json'), `${JSON.stringify(merged, null, 2)}\n`)
          console.log(`Merged ${manifests.length} updater manifests into dist/latest.json`)
          console.log(`Platforms: ${Object.keys(merged.platforms).sort().join(', ')}`)
          for (const [k, p] of Object.entries(merged.platforms)) {
            console.log(`  ${k}: ${p.url}`)
          }
          NODE

      - name: Generate release notes
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published updater assets
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node <<'NODE'
          const crypto = require('crypto')
          const fs = require('fs')
          const path = require('path')

          const latest = JSON.parse(fs.readFileSync('dist/latest.json', 'utf8'))
          const localFiles = []
          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name)
              if (entry.isDirectory()) walk(full)
              else localFiles.push(full)
            }
          }
          walk('dist')

          async function check(platform, update) {
            const file = path.basename(new URL(update.url).pathname)
            const local = localFiles.find(candidate => path.basename(candidate) === file)
            if (!local) throw new Error(`${platform}: local staged asset not found: ${file}`)
            const localSignature = fs.readFileSync(`${local}.sig`, 'utf8').trim()
            if (update.signature !== localSignature) throw new Error(`${platform}: manifest signature differs from staged signature`)
            const response = await fetch(update.url)
            if (!response.ok) throw new Error(`${platform}: release download returned ${response.status}`)
            const published = Buffer.from(await response.arrayBuffer())
            const localHash = crypto.createHash('sha256').update(fs.readFileSync(local)).digest('hex')
            const publishedHash = crypto.createHash('sha256').update(published).digest('hex')
            if (localHash !== publishedHash) throw new Error(`${platform}: published asset hash differs from signed staged asset`)
            console.log(`${platform}: published bundle and signature match staged final asset`)
          }

          Promise.all(Object.entries(latest.platforms).map(([platform, update]) => check(platform, update)))
            .catch(error => { console.error(error); process.exitCode = 1 })
          NODE
